<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Narrow-gate / lighthouse glyph. Single accent on dark.
       Design: a thin vertical "highway" splitting a square frame —
       the narrow way through four gates. -->
  <rect width="64" height="64" rx="12" fill="#08090d"/>
  <!-- four-gate frame -->
  <rect x="10" y="10" width="44" height="44" rx="6"
        fill="none" stroke="#1e2130" stroke-width="2"/>
  <!-- horizontal gate dividers -->
  <line x1="10" y1="21" x2="54" y2="21" stroke="#1e2130" stroke-width="1.25"/>
  <line x1="10" y1="32" x2="54" y2="32" stroke="#1e2130" stroke-width="1.25"/>
  <line x1="10" y1="43" x2="54" y2="43" stroke="#1e2130" stroke-width="1.25"/>
  <!-- the narrow highway: vertical accent column -->
  <rect x="30" y="10" width="4" height="44" fill="#4f8ef7"/>
  <!-- light at the top -->
  <circle cx="32" cy="12" r="3" fill="#4f8ef7"/>
  <circle cx="32" cy="12" r="6" fill="#4f8ef7" fill-opacity="0.18"/>
</svg>
