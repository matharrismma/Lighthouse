name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run engine tests
        run: PYTHONPATH=src python tests/test_engine.py

      - name: Run verifier tests
        run: PYTHONPATH=src python tests/test_verifiers.py

      - name: Run CLI tests
        run: PYTHONPATH=src python tests/test_cli.py

      - name: Run MCP tool tests
        run: PYTHONPATH=src python tests/test_mcp_tools.py

      - name: Run canon-validator smoke tests
        run: PYTHONPATH=src python tests/test_canon_validators.py

      - name: Run full pytest suite
        run: PYTHONPATH=src pytest tests/ -q

      - name: Manifest is up to date
        run: python scripts/regenerate_manifest.py --check

  benchmark:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run 722-claim benchmark
        run: cd lw/09_evaluation && python -u run_benchmark.py

      - name: Enforce accuracy gates
        # The benchmark is V1's quality contract. These thresholds are the
        # floor below which a regression must be addressed before merge.
        run: |
          python - <<'EOF'
          import json
          s = json.load(open("lw/09_evaluation/benchmark_summary.json"))
          overall = s["overall"]
          acc = overall["accuracy_pct"] / 100.0
          assert acc >= 0.99, f"Overall accuracy {acc:.1%} < 99% floor"
          for d, m in s["by_domain"].items():
              dom_acc = m["accuracy_pct"] / 100.0
              if d in ("chemistry", "governance", "physics", "mathematics", "statistics"):
                  assert dom_acc == 1.0, f"{d} accuracy {dom_acc:.1%} regressed below 100%"
              else:
                  assert dom_acc >= 0.99, f"{d} accuracy {dom_acc:.1%} < 99% floor"
          print(f"PASS: overall {acc:.1%}, all per-domain floors met")
          EOF

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/
