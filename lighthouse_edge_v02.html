const clamp01 = x => x < 0 ? 0 : x > 1 ? 1 : x;

const flowHealth = (s, m, b) => {
  s = clamp01(s); m = clamp01(m); b = clamp01(b);
  const spread = Math.max(s, m, b) - Math.min(s, m, b);
  const presence = (s + m + b) / 3;
  return clamp01(0.60 * (1 - spread) + 0.40 * presence);
};

const beautyScore = (s, m, b) => {
  s = clamp01(s); m = clamp01(m); b = clamp01(b);
  const health = flowHealth(s, m, b);
  const comp = Math.max(s, m, b) - (s + m + b) / 3;
  const economy = clamp01(1 - comp);
  return clamp01(health * economy);
};

const shadowOfLaw = (L, C, P) => {
  L = clamp01(L); C = clamp01(C); P = clamp01(P);
  return clamp01(L * Math.max(0, P - C));
};

const viceIndex = (S, K, D) => {
  S = clamp01(S); K = clamp01(K); D = clamp01(D);
  const bypass = D * (1 - K);
  const falseSrc = (1 - S) * D;
  return clamp01(0.60 * bypass + 0.40 * falseSrc);
};

  if (o.alignStreak >= 1 && o.access < 3) o.access += 1;

}
function deriveSignals(pkt, gr, cal) {

  return s;
}

function FetchScr({onBack, onPkt}) {
  const [url,sUrl]=useState(""); const [busy,sBusy]=useState(false); const [res,sRes]=useState(null); const [err,sErr]=useState("");
  const go=async()=>{ if(!url.trim())return; sBusy(true);sErr("");sRes(null); try{ const r=await fetch(url.trim()); if(!r.ok)throw new Error(`HTTP ${r.status}`); const t=await r.text(); try{sRes(JSON.parse(t))}catch{sRes({raw:t.slice(0,2000)})} }catch(e){sErr(`Fetch failed: ${e.message}. Expected offline \u2014 app works without connectivity.`)} sBusy(false); };
  return (
    <div>
      <Back onClick={onBack} /><Title>Fetch External Data</Title>
      <Panel>
        <div style={{fontSize:13,color:"#a1a1aa",lineHeight:1.5,marginBottom:12}}>When online, fetch data and auto-generate an observation packet. Offline is default; fetching is opportunistic.</div>
        <div style={{display:"flex",gap:6}}><Inp value={url} onChange={e=>sUrl(e.target.value)} placeholder="https://..." onKeyDown={e=>e.key==="Enter"&&go()} style={{flex:1}} /><Btn1 onClick={go} style={{flex:"none",padding:"10px 16px"}}>{busy?"...":"Fetch"}</Btn1></div>
      </Panel>
      {err&&<div style={{background:"#2a0a0a",border:"1px solid #dc262633",borderRadius:10,padding:12,marginBottom:16,fontFamily:M,fontSize:12,color:"#fca5a5",lineHeight:1.5}}>{err}</div>}
      {res&&<div><Panel><Lbl>Fetched</Lbl><pre style={{fontFamily:M,fontSize:11,color:"#a1a1aa",lineHeight:1.5,whiteSpace:"pre-wrap",wordBreak:"break-all",maxHeight:200,overflow:"auto"}}>{JSON.stringify(res,null,2).slice(0,1000)}</pre></Panel><Btn1 onClick={()=>onPkt({packetType:"observation",domain:"field",title:`External: ${url.slice(0,40)}`,freeText:JSON.stringify(res).slice(0,500),proposedAction:"Review fetched data",urgency:"medium",witnessPresent:false,sourceBasis:"incomplete",riskLevel:"low",assetId:"",notes:`Source: ${url}`,constraints:[]})} style={{width:"100%"}}>{"\uFF0B"} Create Packet</Btn1></div>}
      <div style={{marginTop:24}}><Lbl>Quick Sources</Lbl>{[{l:"JSON Placeholder",u:"https://jsonplaceholder.typicode.com/todos/1"},{l:"IP Info",u:"https://httpbin.org/ip"},{l:"World Time",u:"https://worldtimeapi.org/api/ip"}].map(s=><div key={s.l} style={{background:"#18181b",border:"1px solid #27272a",borderRadius:10,padding:"10px 14px",marginBottom:6,cursor:"pointer",display:"flex",justifyContent:"space-between"}} onClick={()=>sUrl(s.u)}><span style={{fontSize:13,color:"#a1a1aa"}}>{s.l}</span><span style={{fontFamily:M,fontSize:10,color:"#52525b"}}>{"\u2192"}</span></div>)}</div>
    </div>
  );
}

function ExportScr({pkts, cal, onBack, onExpOne, onExpAll, onExpState, onImpState}) {
  const ev=pkts.filter(p=>p.gateResult); const fr=useRef(null);
  return (
    <div>
      <Back onClick={onBack} /><Title>Export / Import</Title>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
        <Panel style={{marginBottom:0}}><div style={{fontFamily:M,fontSize:32,fontWeight:800,color:"#e4e4e7"}}>{ev.length}</div><div style={{fontFamily:M,fontSize:10,color:"#71717a",letterSpacing:1,textTransform:"uppercase"}}>Evaluated</div></Panel>
        <Panel style={{marginBottom:0}}><div style={{fontFamily:M,fontSize:32,fontWeight:800,color:"#e4e4e7"}}>{pkts.length}</div><div style={{fontFamily:M,fontSize:10,color:"#71717a",letterSpacing:1,textTransform:"uppercase"}}>Total</div></Panel>
      </div>
      {ev.length>0&&<Btn1 onClick={onExpAll} style={{width:"100%",marginBottom:10}}>{"\u21E5"} Export All Packets</Btn1>}
      <Btn1 onClick={onExpState} style={{width:"100%",marginBottom:10}}>{"\u21E5"} Export Full State (microSD)</Btn1>
      <div style={{position:"relative",marginBottom:20}}>
        <Btn2 onClick={()=>fr.current?.click()} style={{width:"100%"}}>{"\u21C5"} Import State from File</Btn2>
        <input ref={fr} type="file" accept=".json" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>{try{onImpState(JSON.parse(ev.target.result))}catch{}};r.readAsText(f)}}} />
      </div>
    </div>
  );
}

function Toast({m,v}) { if(!v)return null; return <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",zIndex:999,background:"#27272a",color:"#e4e4e7",fontFamily:M,fontSize:12,letterSpacing:1,padding:"10px 20px",borderRadius:10,boxShadow:"0 4px 20px rgba(0,0,0,0.5)"}}>{m}</div>; }

// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
// APP ROOT
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ

function App() {
  // Load persisted state
  const saved = useRef(loadState());
  const [scr,sScr] = useState("home");
  const [pkts,sPkts] = useState(saved.current?.packets || []);
  const [cur,sCur] = useState(null);
  const [fi,sFi] = useState(null);
  const [cal,sCal] = useState(saved.current?.calibre || {...INIT_CAL});
  const [toast,sToast] = useState({m:"",v:false});
  const tR = useRef(null);

  // Auto-save on change
  useEffect(()=>{ saveState(pkts, cal); }, [pkts, cal]);

  const flash = m=>{ sToast({m,v:true}); clearTimeout(tR.current); tR.current=setTimeout(()=>sToast({m:"",v:false}),2500); };

  const mkPkt = (f,st="draft")=>({
    packetId:gid(),createdAt:nw(),updatedAt:nw(),deviceId:"lh_edge_v01",
    packetType:f.packetType,domain:f.domain,title:f.title,freeText:f.freeText,
    actors:["user"],urgency:f.urgency,witnessPresent:f.witnessPresent,
    sourceBasis:f.sourceBasis,riskLevel:f.riskLevel,proposedAction:f.proposedAction,
    constraints:f.constraints,assetId:f.assetId||null,nfcTagId:f.nfcTagId||null,
    gateResult:null,status:st,exportStatus:"pending",
  });

  const [online,sOnline] = useState(navigator.onLine);
  useEffect(()=>{
    const on=()=>sOnline(true); const off=()=>sOnline(false);
    window.addEventListener("online",on); window.addEventListener("offline",off);
    return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off);};
  },[]);

  const doEval = async f=>{
    const p=mkPkt(f,"evaluated");
    const apiPkt={domain:p.domain||"governance",id:p.packetId,scope:"adapter",
      created_epoch:Math.floor(Date.now()/1000)-3601,
      required_witnesses:p.witnessPresent?1:0,witness_count:p.witnessPresent?1:0,
      text:`${p.title}. ${p.freeText}. Action: ${p.proposedAction}. Risk: ${p.riskLevel}. Urgency: ${p.urgency}.`};
    const apiRes = await validateViaAPI(apiPkt);
    p.gateResult = apiRes ? apiResultToLocalResult(apiRes) : evaluate(p,cal);
    p.status="evaluated";
    const nc=runCalibreCycle(cal,p,p.gateResult); sCal(nc);
    sPkts(prev=>[p,...prev]); sCur(p); sScr("result");
    const src=p.gateResult._source==="api"?`Ledger #${p.gateResult._ledgerSeq}`:"Local";
    flash(`Evaluated \u00B7 ${src} \u00B7 Calibre updated`);
  };
  const doSave = f=>{ sPkts(prev=>[mkPkt(f),...prev]); flash("Draft saved"); sScr("home"); };

  const dl=(d,fn)=>{ const b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"}); const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u;a.download=fn;a.click();URL.revokeObjectURL(u); };
  const expPkt=p=>{ dl({...p,exportStatus:"exported"},`${p.packetId}_${p.gateResult?p.gateResult.result:"DRAFT"}.json`); sPkts(pr=>pr.map(q=>q.packetId===p.packetId?{...q,exportStatus:"exported"}:q)); flash(`Exported ${p.packetId}`); };
  const expAll=()=>{ const ev=pkts.filter(p=>p.gateResult); if(!ev.length)return; dl(ev,`lighthouse_${new Date().toISOString().slice(0,10)}.json`); flash(`Exported ${ev.length}`); };
  const expState=()=>{ dl({version:"0.1.0",exportedAt:nw(),calibre:cal,packets:pkts},`lighthouse_state_${new Date().toISOString().slice(0,10)}.json`); flash("Full state exported"); };
  const impState=d=>{ if(d.calibre)sCal(d.calibre); if(d.packets)sPkts(d.packets); flash(`Imported ${d.packets?.length||0} packets`); sScr("home"); };
  const doNfc=t=>{ sFi({...EMPTY,packetType:"maintenance",domain:"operations",assetId:t.asset_id,nfcTagId:t.asset_id,title:`${t.asset_type} \u2014 ${t.asset_id}`}); sScr("form"); };
  const doFetchPkt=f=>{ sFi(f); sScr("form"); };
  const nav=(s,d)=>{ if(s==="form")sFi(d||null); sScr(s); };

  return (
    <div style={{fontFamily:S,background:"#0c0c0e",color:"#d4d4d8",minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>
      <div style={{background:"#111113",borderBottom:"1px solid #27272a",padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>nav("home")}>
          <span style={{fontSize:18}}>{"\u2B21"}</span>
          <span style={{fontFamily:M,fontSize:13,fontWeight:700,letterSpacing:3,color:"#a1a1aa",textTransform:"uppercase"}}>Lighthouse Edge</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontFamily:M,fontSize:9,color:TC[cal.tier].color,letterSpacing:1}}>{TC[cal.tier].icon} {cal.tier}</span>
          <div title={online?"Online â":"Offline"} style={{width:8,height:8,borderRadius:"50%",background:online?"#16a34a":"#52525b",boxShadow:online?"0 0 8px rgba(22,163,74,0.6)":"none"}} />
        </div>
      </div>
      <div style={{padding:"14px 18px 100px"}}>
        {scr==="home"&&<Home nav={nav} n={pkts.length} cal={cal} />}
        {scr==="form"&&<Form initial={fi} onBack={()=>nav("home")} onEval={doEval} onSave={doSave} />}
        {scr==="result"&&cur&&<ResultView pkt={cur} cal={cal} onBack={()=>nav("list")} onHome={()=>nav("home")} onExport={expPkt} />}
        {scr==="list"&&<PktList pkts={pkts} onBack={()=>nav("home")} onSel={p=>{sCur(p);sScr("detail")}} />}
        {scr==="detail"&&cur&&<Detail pkt={cur} cal={cal} onBack={()=>nav("list")} onExport={expPkt} />}
        {scr==="nfc"&&<NfcScan onBack={()=>nav("home")} onTag={doNfc} />}
        {scr==="calibre"&&<CalDash cal={cal} onBack={()=>nav("home")} />}
        {scr==="fetch"&&<FetchScr onBack={()=>nav("home")} onPkt={doFetchPkt} />}
        {scr==="export"&&<ExportScr pkts={pkts} cal={cal} onBack={()=>nav("home")} onExpOne={expPkt} onExpAll={expAll} onExpState={expState} onImpState={impState} />}
      </div>
      <Toast m={toast.m} v={toast.v} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
