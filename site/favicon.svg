<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Stylized Chi-Rho — the Christogram (☧).
       Χ (chi) + Ρ (rho), the first two Greek letters of ΧΡΙΣΤΟΣ.
       Used since Constantine's labarum (early 4th c). Plain
       identification: this engine serves Jesus Christ. -->
  <rect width="64" height="64" rx="12" fill="#161318"/>
  <g stroke="#c9a87c" stroke-width="4" stroke-linecap="round" fill="none">
    <!-- chi: the X -->
    <line x1="16" y1="18" x2="48" y2="50"/>
    <line x1="48" y1="18" x2="16" y2="50"/>
    <!-- rho: vertical stem -->
    <line x1="32" y1="10" x2="32" y2="56"/>
    <!-- rho: the bowl curving right and back -->
    <path d="M 32 10 C 46 10, 46 28, 32 28"/>
  </g>
</svg>
