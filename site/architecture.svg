<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 600" font-family="Inter, system-ui, sans-serif">
  <!-- Concordance Engine architecture diagram.
       Packet flow: agent → entry point → 4 gates → verdict → ledger.
       Layer 0 anchors the whole structure underneath. -->

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#5a6072"/>
    </marker>
    <marker id="arrow-pass" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#2dd4a0"/>
    </marker>
    <marker id="arrow-reject" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#f75f5f"/>
    </marker>
    <marker id="arrow-quar" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#f7b84f"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="600" fill="#08090d"/>

  <!-- Title -->
  <text x="460" y="38" text-anchor="middle" fill="#e8eaf0" font-size="20" font-weight="500">Concordance Engine — packet flow</text>
  <text x="460" y="58" text-anchor="middle" fill="#5a6072" font-size="12" font-family="JetBrains Mono, monospace" letter-spacing="0.05em">RED → FLOOR → BROTHERS → GOD</text>

  <!-- ========== Top row: agents and entry points ========== -->
  <g>
    <!-- Agent -->
    <rect x="40" y="100" width="140" height="60" rx="10" fill="#0f1117" stroke="#1e2130" stroke-width="1.5"/>
    <text x="110" y="128" text-anchor="middle" fill="#e8eaf0" font-size="14" font-weight="500">AI agent</text>
    <text x="110" y="146" text-anchor="middle" fill="#5a6072" font-size="11">submitter</text>

    <!-- Entry-point branch -->
    <line x1="180" y1="130" x2="240" y2="130" stroke="#5a6072" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="240" y="80" width="160" height="34" rx="6" fill="#0f1117" stroke="#1e2130" stroke-width="1.2"/>
    <text x="320" y="102" text-anchor="middle" fill="#4f8ef7" font-size="12" font-family="JetBrains Mono, monospace">MCP server</text>

    <rect x="240" y="118" width="160" height="34" rx="6" fill="#0f1117" stroke="#4f8ef7" stroke-width="1.5"/>
    <text x="320" y="140" text-anchor="middle" fill="#e8eaf0" font-size="12" font-family="JetBrains Mono, monospace">REST  /submit · /validate</text>

    <rect x="240" y="156" width="160" height="34" rx="6" fill="#0f1117" stroke="#1e2130" stroke-width="1.2"/>
    <text x="320" y="178" text-anchor="middle" fill="#4f8ef7" font-size="12" font-family="JetBrains Mono, monospace">CLI  concordance</text>

    <!-- Reflect (preview) -->
    <rect x="240" y="200" width="160" height="34" rx="6" fill="#0f1117" stroke="#1e2130" stroke-width="1.2" stroke-dasharray="3,3"/>
    <text x="320" y="222" text-anchor="middle" fill="#5a6072" font-size="12" font-family="JetBrains Mono, monospace">REST  /reflect (preview)</text>

    <line x1="400" y1="135" x2="450" y2="135" stroke="#5a6072" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- ========== Engine box ========== -->
  <g>
    <rect x="450" y="80" width="430" height="220" rx="12" fill="#0f1117" stroke="#1e2130" stroke-width="1.5"/>
    <text x="665" y="106" text-anchor="middle" fill="#e8eaf0" font-size="13" font-weight="500" font-family="JetBrains Mono, monospace" letter-spacing="0.05em">FOUR GATES</text>

    <!-- RED -->
    <g>
      <rect x="475" y="125" width="80" height="50" rx="6" fill="#2b0d0d" stroke="#4a1a1a" stroke-width="1.2"/>
      <text x="515" y="148" text-anchor="middle" fill="#f75f5f" font-size="13" font-weight="500" font-family="JetBrains Mono, monospace">RED</text>
      <text x="515" y="164" text-anchor="middle" fill="#f75f5f" font-size="9" opacity="0.7">refusal</text>
    </g>
    <line x1="555" y1="150" x2="585" y2="150" stroke="#5a6072" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- FLOOR -->
    <g>
      <rect x="585" y="125" width="80" height="50" rx="6" fill="#0d1c2b" stroke="#1a3a4a" stroke-width="1.2"/>
      <text x="625" y="148" text-anchor="middle" fill="#4f8ef7" font-size="13" font-weight="500" font-family="JetBrains Mono, monospace">FLOOR</text>
      <text x="625" y="164" text-anchor="middle" fill="#4f8ef7" font-size="9" opacity="0.7">completeness</text>
    </g>
    <line x1="665" y1="150" x2="695" y2="150" stroke="#5a6072" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- BROTHERS -->
    <g>
      <rect x="695" y="125" width="80" height="50" rx="6" fill="#2b2208" stroke="#4a3a10" stroke-width="1.2"/>
      <text x="735" y="148" text-anchor="middle" fill="#f7b84f" font-size="11" font-weight="500" font-family="JetBrains Mono, monospace">BROTHERS</text>
      <text x="735" y="164" text-anchor="middle" fill="#f7b84f" font-size="9" opacity="0.7">witness</text>
    </g>
    <line x1="775" y1="150" x2="805" y2="150" stroke="#5a6072" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- GOD -->
    <g>
      <rect x="805" y="125" width="55" height="50" rx="6" fill="#0d2b22" stroke="#1a4a38" stroke-width="1.2"/>
      <text x="832" y="148" text-anchor="middle" fill="#2dd4a0" font-size="13" font-weight="500" font-family="JetBrains Mono, monospace">GOD</text>
      <text x="832" y="164" text-anchor="middle" fill="#2dd4a0" font-size="9" opacity="0.7">wait</text>
    </g>

    <!-- Verifiers row (cross-cut) -->
    <text x="665" y="210" text-anchor="middle" fill="#5a6072" font-size="11" font-family="JetBrains Mono, monospace" letter-spacing="0.04em">RED ALSO RUNS COMPUTATIONAL VERIFIERS</text>
    <g font-size="10" font-family="JetBrains Mono, monospace" fill="#5a6072">
      <text x="475" y="232">chemistry</text>
      <text x="540" y="232">physics</text>
      <text x="600" y="232">math</text>
      <text x="650" y="232">stats</text>
      <text x="700" y="232">cs</text>
      <text x="725" y="232">biology</text>
      <text x="785" y="232">governance</text>
    </g>
    <text x="665" y="252" text-anchor="middle" fill="#4f8ef7" font-size="10" font-family="JetBrains Mono, monospace">+ scripture (cross-cutting; runs on every packet)</text>

    <text x="665" y="282" text-anchor="middle" fill="#5a6072" font-size="10" font-style="italic">halt at first failure  ·  never self-confirm</text>
  </g>

  <!-- ========== Verdict outputs ========== -->
  <g>
    <!-- PASS → Ledger -->
    <line x1="600" y1="320" x2="600" y2="370" stroke="#2dd4a0" stroke-width="2" marker-end="url(#arrow-pass)"/>
    <text x="610" y="345" fill="#2dd4a0" font-size="11" font-family="JetBrains Mono, monospace">PASS</text>

    <!-- REJECT (left) -->
    <path d="M 530 310 Q 380 340 230 370" fill="none" stroke="#f75f5f" stroke-width="2" marker-end="url(#arrow-reject)"/>
    <text x="350" y="335" fill="#f75f5f" font-size="11" font-family="JetBrains Mono, monospace">REJECT</text>

    <!-- QUARANTINE (right) -->
    <path d="M 760 310 Q 810 340 870 370" fill="none" stroke="#f7b84f" stroke-width="2" marker-end="url(#arrow-quar)"/>
    <text x="800" y="335" fill="#f7b84f" font-size="11" font-family="JetBrains Mono, monospace">QUARANTINE</text>
  </g>

  <!-- Ledger (centered, prominent) -->
  <g>
    <rect x="490" y="370" width="220" height="80" rx="10" fill="#0d2b22" stroke="#1a4a38" stroke-width="1.5"/>
    <text x="600" y="396" text-anchor="middle" fill="#2dd4a0" font-size="14" font-weight="500">Ledger</text>
    <text x="600" y="416" text-anchor="middle" fill="#2dd4a0" font-size="10" font-family="JetBrains Mono, monospace" opacity="0.7">SHA-256 hash chain</text>
    <text x="600" y="434" text-anchor="middle" fill="#5a6072" font-size="10">append-only · permanent</text>
  </g>

  <!-- Reject and Quarantine destinations (smaller) -->
  <g>
    <rect x="120" y="370" width="220" height="80" rx="10" fill="#2b0d0d" stroke="#4a1a1a" stroke-width="1.2"/>
    <text x="230" y="396" text-anchor="middle" fill="#f75f5f" font-size="13" font-weight="500">Returned to caller</text>
    <text x="230" y="414" text-anchor="middle" fill="#5a6072" font-size="10">also recorded with REJECT verdict</text>
    <text x="230" y="430" text-anchor="middle" fill="#5a6072" font-size="10">read gate_results[i].reasons → fix → resubmit</text>
  </g>
  <g>
    <rect x="780" y="370" width="120" height="80" rx="10" fill="#2b2208" stroke="#4a3a10" stroke-width="1.2"/>
    <text x="840" y="396" text-anchor="middle" fill="#f7b84f" font-size="13" font-weight="500">Hold</text>
    <text x="840" y="414" text-anchor="middle" fill="#5a6072" font-size="10">add witnesses</text>
    <text x="840" y="428" text-anchor="middle" fill="#5a6072" font-size="10">or wait, then</text>
    <text x="840" y="442" text-anchor="middle" fill="#5a6072" font-size="10">resubmit</text>
  </g>

  <!-- ========== Layer 0 (foundation) ========== -->
  <g>
    <rect x="40" y="490" width="840" height="80" rx="10" fill="#0f1117" stroke="#1e2130" stroke-width="1.5"/>
    <line x1="40" y1="490" x2="880" y2="490" stroke="#4f8ef7" stroke-width="2"/>
    <text x="460" y="514" text-anchor="middle" fill="#4f8ef7" font-size="13" font-weight="500" font-family="JetBrains Mono, monospace" letter-spacing="0.05em">LAYER 0  ·  WORD SOURCE</text>
    <text x="460" y="535" text-anchor="middle" fill="#5a6072" font-size="11">Hebrew (morphhb / WLC) · Greek (MorphGNT) · Strong's lexicon · World English Bible</text>
    <text x="460" y="552" text-anchor="middle" fill="#5a6072" font-size="10" font-style="italic">Every gate name and the scripture verifier are calibrated against this layer.</text>
  </g>

  <!-- Connecting tick from Layer 0 to engine (subtle) -->
  <line x1="665" y1="490" x2="665" y2="450" stroke="#1e2130" stroke-width="1" stroke-dasharray="2,3"/>
</svg>
