<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your things — Narrow Highway</title>
<meta name="description" content="Everything you've kept — lists, drafts, notes, verified claims. On your device. Private, nothing tracked.">
<meta name="theme-color" content="#0a0810">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Crimson+Pro:ital@0;1&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0810;--tx:#ede7db;--dim:#b3aabd;--mut:#6e6878;--accent:#c9a87c;--accenthi:#e3c498;--surface:#161320;--border:#29232f;--pass:#6fc47c;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--tx);font-family:Inter,system-ui,sans-serif;line-height:1.55;min-height:100dvh;-webkit-font-smoothing:antialiased;}
  a{color:var(--accent);text-decoration:none;}
  .wrap{max-width:640px;margin:0 auto;padding:30px 20px 70px;}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .kicker{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mut);}
  .home{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);}
  h1{font-family:'Crimson Pro',Georgia,serif;font-weight:400;font-size:2rem;color:#f4ecd5;margin:2px 0 4px;}
  .sub{font-family:'Crimson Pro',Georgia,serif;font-style:italic;color:var(--dim);margin-bottom:22px;}
  .day{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin:22px 0 9px;}
  .item{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:0 11px 11px 0;padding:13px 16px;margin-bottom:9px;}
  .item .lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;display:flex;justify-content:space-between;}
  .item .lbl .t{color:var(--mut);}
  .li{display:flex;align-items:center;gap:9px;padding:4px 0;}
  .li .bx{width:13px;height:13px;border:1.5px solid var(--accent);border-radius:3px;flex:none;}
  .li .tx{font-family:'Crimson Pro',Georgia,serif;font-size:1.02rem;color:#f4ecd5;}
  .note-t{font-family:'Crimson Pro',Georgia,serif;font-size:1.1rem;color:#f4ecd5;}
  .note-b,.body{font-family:'Crimson Pro',Georgia,serif;font-size:1rem;color:var(--tx);white-space:pre-wrap;line-height:1.5;margin-top:3px;}
  .to{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);}
  .subj{font-family:'Crimson Pro',Georgia,serif;font-size:1.05rem;color:#f4ecd5;margin:2px 0 6px;}
  .verd{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--pass);}
  .verd.broken{color:#e07a6f;}
  .claim{font-family:'Crimson Pro',Georgia,serif;font-size:1.05rem;color:#f4ecd5;}
  .seal-lnk{display:inline-block;margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--accent);}
  .empty{text-align:center;color:var(--dim);font-family:'Crimson Pro',Georgia,serif;font-style:italic;padding:50px 0;line-height:1.6;}
  .clear{display:block;margin:34px auto 0;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--mut);background:transparent;border:1px solid var(--border);border-radius:8px;padding:8px 14px;cursor:pointer;}
  .clear:hover{color:#e07a6f;border-color:#e07a6f;}
  .priv{text-align:center;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);margin-top:26px;}
  /* the front door, reachable here too */
  .bringbar{display:flex;gap:8px;margin:0 0 22px;}
  .bringbar input{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--tx);font-family:inherit;font-size:14px;outline:none;}
  .bringbar input:focus{border-color:var(--accent);}
  .bringbar input::placeholder{color:var(--mut);}
  .bringbar button{flex:none;background:var(--accent);color:var(--bg);border:none;border-radius:10px;padding:0 16px;font-size:16px;cursor:pointer;font-weight:600;}
  .bringbar button:hover{background:var(--accenthi);}
  /* Your documents — cards you can return to */
  .docs-head{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accenthi);margin:6px 0 12px;}
  .doccards{display:grid;grid-template-columns:1fr;gap:11px;margin-bottom:30px;}
  @media(min-width:600px){.doccards{grid-template-columns:1fr 1fr;}}
  .doccard{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:15px 17px;display:flex;flex-direction:column;}
  .doccard:hover{border-color:var(--accent);}
  .dc-title{font-family:'Crimson Pro',Georgia,serif;font-size:1.12rem;color:#f4ecd5;line-height:1.3;}
  .dc-prev{font-family:'Crimson Pro',Georgia,serif;font-size:.95rem;color:var(--mut);margin-top:6px;line-height:1.5;max-height:4.5em;overflow:hidden;}
  .dc-meta{display:flex;align-items:center;gap:12px;margin-top:11px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--mut);}
  .dc-meta .when{flex:1;}
  .dc-open{color:var(--accenthi);text-decoration:none;text-transform:uppercase;letter-spacing:.1em;}
  .dc-open:hover{text-decoration:underline;}
  .dc-del{color:var(--mut);text-decoration:none;cursor:pointer;}
  .dc-del:hover{color:#e07a6f;}
  /* Your key — local-first, carried by you */
  .keypanel{margin:30px 0 6px;padding:18px 18px;border:1px solid var(--border);border-radius:12px;background:rgba(201,168,124,.05);}
  .kp-head{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accenthi);margin-bottom:9px;}
  .kp-note{font-family:'Crimson Pro',Georgia,serif;font-size:.95rem;color:var(--mut);line-height:1.5;margin:8px 0;}
  .kp-note b{color:var(--tx);}
  .kp-row{display:flex;gap:8px;align-items:center;margin:8px 0;}
  .kp-row code{flex:1;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accenthi);background:rgba(0,0,0,.25);padding:9px 12px;border-radius:8px;overflow-x:auto;}
  .kp-row input{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;}
  .kp-row input:focus{border-color:var(--accent);}
  .kp-row button{flex:none;background:var(--accent);color:var(--bg);border:none;border-radius:8px;padding:9px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;}
  .kp-row button:hover{background:var(--accenthi);}
  .kp-msg{font-family:'Crimson Pro',Georgia,serif;font-size:.9rem;color:var(--accenthi);min-height:1.2em;margin-top:4px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="kicker">Kept on this device</div><a class="home" href="/">&larr; the work area</a></div>
  <h1>Your things.</h1>
  <div class="sub">Everything you've written and kept — your documents, plus lists, drafts, notes, and what you checked.</div>
  <form class="bringbar" onsubmit="return nhGo()">
    <input id="bringq" autocomplete="off" placeholder="Bring something new — a note, a list, a claim to check&hellip;">
    <button type="submit" aria-label="Bring it to the work area">&rarr;</button>
  </form>
  <div id="docs"></div>
  <div id="shelf"></div>
  <div id="keypanel" class="keypanel"></div>
  <div class="priv">Stored on this device &middot; carried only by your key &middot; nothing tracked</div>
</div>
<script src="/nh-memory.js"></script>
<script>
function nhGo(){var v=(document.getElementById('bringq').value||'').trim();if(v)location.href='/?bring='+encodeURIComponent(v);return false;}
// Your documents — cards you can return to. Open one to keep writing it in the
// work area. On-device; nothing leaves.
(function(){
  var docs=document.getElementById('docs'); if(!docs||!window.NHDocs) return;
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function when(ts){ try{ var d=new Date(ts); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' · '+d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}); }catch(e){ return ''; } }
  function render(){
    var list=NHDocs.list();
    if(!list.length){ docs.innerHTML=''; return; }
    var h='<div class="docs-head">Your documents · '+list.length+'</div><div class="doccards">';
    list.forEach(function(it){
      var prev=(it.text||'').replace(/\s+/g,' ').trim();
      h+='<div class="doccard"><div class="dc-title">'+esc(it.title||'Untitled document')+'</div>'+
         (prev?'<div class="dc-prev">'+esc(prev.slice(0,180))+(prev.length>180?'…':'')+'</div>':'')+
         '<div class="dc-meta"><span class="when">'+esc(when(it.updated||it.ts))+'</span>'+
         '<a class="dc-open" href="#" data-open="'+esc(it.id)+'">Open &rarr;</a>'+
         '<a class="dc-del" data-del="'+esc(it.id)+'">remove</a></div></div>';
    });
    docs.innerHTML=h+'</div>';
    docs.querySelectorAll('[data-open]').forEach(function(a){ a.addEventListener('click',function(e){ e.preventDefault(); try{localStorage.setItem('nh_open_doc', a.getAttribute('data-open'));}catch(_){} location.href='/'; }); });
    docs.querySelectorAll('[data-del]').forEach(function(a){ a.addEventListener('click',function(e){ e.preventDefault(); if(confirm('Remove this document? This cannot be undone.')){ NHDocs.remove(a.getAttribute('data-del')); if(window.NHSync)NHSync.push(); render(); } }); });
  }
  render();
  // Cross-device: when this person's memory syncs in, refresh the cards.
  window.addEventListener('nh-synced', render);
})();
// Your key — everything is stored on THIS device; the key carries a copy to
// your other devices and restores it if this one is lost. We give you one;
// paste another device's key to bring that work here.
(function(){
  var el=document.getElementById('keypanel'); if(!el||!window.NHKey) return;
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function render(){
    var k=NHKey.ensure();
    el.innerHTML='<div class="kp-head">Your key</div>'+
      '<div class="kp-note">Everything you keep lives on <b>this device</b>. Your key carries a copy to your other devices and restores it if this one is lost. Keep it private — it is the only key, and we cannot recover it for you.</div>'+
      '<div class="kp-row"><code id="kpval">'+esc(k)+'</code><button id="kpcopy" type="button">Copy</button></div>'+
      '<div class="kp-note">On another device, paste that key here to bring your work over:</div>'+
      '<div class="kp-row"><input id="kpin" placeholder="hh_…" autocomplete="off" spellcheck="false"><button id="kpuse" type="button">Bring my work</button></div>'+
      '<div id="kpmsg" class="kp-msg"></div>';
    document.getElementById('kpcopy').addEventListener('click',function(){ try{navigator.clipboard.writeText(k);this.textContent='Copied ✓';}catch(e){} });
    document.getElementById('kpuse').addEventListener('click',function(){
      var v=(document.getElementById('kpin').value||'').trim(), msg=document.getElementById('kpmsg');
      if(!NHKey.set(v)){ msg.textContent='That does not look like a key (hh_ followed by 16 hex characters).'; return; }
      msg.textContent='Bringing your work…';
      if(window.NHSync){ NHSync.pull(function(ch){ msg.textContent=ch?'Your work is here. ✓':'That key has nothing stored yet (or it is already here).'; render(); }); }
      else { msg.textContent='Key set. It will sync when you reload.'; }
    });
  }
  render();
})();
(function(){
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  var items=[]; try{ items=JSON.parse(localStorage.getItem('nh_kept_v1')||'[]'); }catch(e){}
  var shelf=document.getElementById('shelf');
  if(!items.length){ shelf.innerHTML='<div class="empty">No lists, drafts, or checks kept yet.<br>Bring something on the <a href="/">work area</a> — a grocery note, an email, a claim — and it will land here. (Documents you write show above.)</div>'; return; }

  function dayKey(ts){ var d=new Date(ts); return d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}); }
  function timeOf(ts){ try{ return new Date(ts).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}); }catch(e){ return ''; } }

  var LBL={list:'List',draft:'Draft',note:'Note',verify:'Checked',ask:'Answer'};
  function body(it){
    var o=it.obj||{}, k=it.kind;
    if(k==='list'){ return (o.items||[]).map(function(x){return '<div class="li"><span class="bx"></span><span class="tx">'+esc(x)+'</span></div>';}).join(''); }
    if(k==='draft'){ return (o.to?'<div class="to">To: '+esc(o.to)+'</div>':'')+(o.subject?'<div class="subj">'+esc(o.subject)+'</div>':'')+'<div class="body">'+esc(o.body||'')+'</div>'; }
    if(k==='note'){ return '<div class="note-t">'+esc(o.title||'Note')+'</div><div class="note-b">'+esc(o.note||'')+'</div>'; }
    if(k==='verify'){ var v=(o.verdict||''); var seal=o.cite?'<a class="seal-lnk" href="'+esc(o.cite)+'">open the seal &amp; re-check &rarr;</a>':''; return '<div class="claim">'+esc(o.claim||'')+'</div><div class="verd'+(v==='BROKEN'?' broken':'')+'">'+esc(v||'checked')+'</div>'+seal; }
    if(k==='ask'){ return '<div class="body">'+esc(o.answer||'')+'</div>'; }
    return '<div class="body">'+esc(JSON.stringify(o))+'</div>';
  }
  function label(it){ var o=it.obj||{}; var extra = it.kind==='list'&&o.list?(' &middot; '+esc(o.list)):''; return (LBL[it.kind]||it.kind)+extra; }

  var html='', lastDay=null;
  items.forEach(function(it){
    var dk=dayKey(it.ts);
    if(dk!==lastDay){ html+='<div class="day">'+esc(dk)+'</div>'; lastDay=dk; }
    html+='<div class="item"><div class="lbl"><span>'+label(it)+'</span><span class="t">'+esc(timeOf(it.ts))+'</span></div>'+body(it)+'</div>';
  });
  html+='<button class="clear" id="clear">Clear everything kept here</button>';
  shelf.innerHTML=html;
  document.getElementById('clear').addEventListener('click',function(){
    if(confirm('Remove everything kept on this device? This cannot be undone.')){ try{localStorage.removeItem('nh_kept_v1');}catch(e){} location.reload(); }
  });
})();
</script>
</body>
</html>
