  mission_outcomes:
    ensure_human_services_capacity_to_stabilize_workforce: true
    improve_workforce_readiness_attainment:
      educational_attainment_bachelors_or_higher: 13.8%
      educational_attainment_high_school_or_higher: 85.6%
      high_school_graduation_rate: 93.8%
    increase_ready_industrial_property_capacity: true
    maintain_alliance_marketing_cadence: true
    push_transportation_priorities_tied_to_economic_development: true
  parameters:
    CAPACITY_THRESHOLD: 0.7
    COST_SITE: 30000000
    FIRSTFRUIT_RATE: 0.1
    MINCAP: 3
    OPF: 50000000
    RESF: 150000000
    RESOURCE_THRESHOLD: 1.7
    SEED_IN: 20000000
    SEW_RATE: 0.9
    SURP_SITE: 5000000
  portfolio_mechanics:
    capacity_units: one shovel-ready pad or equivalent project unit
    lag_measures: [jobs created, capital investment]
    lead_measures:
    - '# pad-ready acres'
    - '# RFIs answered'
    - '# employer visits'
    - '# permitting blockers cleared'
    - '# workforce training cohorts'
    - '# transportation projects advanced'
    - '# human services programs supported'
    - '# alliance meetings maintained'
    project_types: [industrial_site, utilities, transportation, housing_workforce_support, marketing, talent]
    shock_model: {failure_rate: 0.02, shock_frequency: 5, shock_impact: 0.3}

