<body>

<div class="masthead">
  <div class="eyebrow">THE CODEX · FACE 2 · THE SEAL</div>
  <h1>The Sealed Manuscript</h1>
  <div class="tagline">The chosen body, walked and indexed by the engine — fingerprinted, signed, and verifiable by anyone</div>
</div>

<div id="out"><div class="empty">Reading the seal…</div></div>

<script>
(function () {
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]; }); }
  var $out = document.getElementById('out');

  Promise.all([
    fetch('/codex/verify', { cache: 'no-store' }).then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; }),
    fetch('/codex/artifact', { cache: 'no-store' }).then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; })
  ]).then(function (res) {
    var v = res[0] || {}, a = res[1] || {};
    if (!v.sealed || !a || a.sealed === false) {
      $out.innerHTML = '<div class="empty">The Codex has not been sealed yet. An operator seals it with <code>POST /codex/seal</code> (or <code>python -m api.codex seal</code>).</div>';
      return;
    }
    var ok = v.signature_valid, fresh = v.indexes_unchanged_since_seal;
    var body = a.body || {}, idx = a.indexes || {};
    function kv(k, v) { return '<div class="row"><div class="k">' + esc(k) + '</div><div class="v">' + v + '</div></div>'; }
    function bd(obj) { return Object.keys(obj || {}).map(function (k) { return '<span>' + esc(k) + ': ' + obj[k] + '</span>'; }).join(' '); }
    $out.innerHTML =
      '<div class="seal">' +
        '<div class="seal-status"><span class="dot' + (ok ? '' : ' bad') + '"></span>' +
          (ok ? 'Sealed &amp; signature verified' : 'Signature INVALID') + '</div>' +
        '<div class="seal-sub">Sealed ' + esc(a.sealed_at) + ' by engine identity <strong>' + esc(v.instance_id || a._instance_id) + '</strong> · Codex ' + esc(a.version || 'v1') + '</div>' +
        '<div class="grid">' +
          kv('Signature', '<span class="check ' + (ok ? 'ok' : 'bad') + '">' + (ok ? '✓ valid (Ed25519)' : '✗ invalid') + '</span>') +
          kv('Indexes since seal', '<span class="check ' + (fresh ? 'ok' : 'bad') + '">' + (fresh ? '✓ unchanged' : '✗ drifted: ' + esc((v.drifted_indexes || []).join(', '))) + '</span>') +
          kv('Body — cards', esc(body.cards_total)) +
          kv('Scripture cross-refs', esc(((idx.scripture || {}).stats || {}).cross_references)) +
          kv('Themes', esc(((idx.themes || {}).stats || {}).themes)) +
          kv('Cross-refs witnessed', esc(((idx.scripture || {}).stats || {}).witnessed)) +
        '</div>' +
        '<div class="row" style="margin-top:0.6em"><div class="k">Body fingerprint (sha256)</div><div class="v"><span class="hash">' + esc(body.body_hash_sha256) + '</span></div></div>' +
        '<div class="row"><div class="k">Scripture index (sha256)</div><div class="v"><span class="hash">' + esc((idx.scripture || {}).sha256) + '</span></div></div>' +
        '<div class="row"><div class="k">Theme index (sha256)</div><div class="v"><span class="hash">' + esc((idx.themes || {}).sha256) + '</span></div></div>' +
        '<div class="row" style="margin-top:0.6em"><div class="k">Body by shelf</div><div class="breakdown">' + bd(body.by_shelf) + '</div></div>' +
        '<div class="row"><div class="k">Body by authority tier</div><div class="breakdown">' + bd(body.by_authority_tier) + '</div></div>' +
        (a.statement ? '<div class="statement">' + esc(a.statement) + '</div>' : '') +
        '<div class="links">Verify it yourself: <a href="/codex/artifact">the signed manifest</a> · <a href="/codex/verify">live verification</a> · <a href="/identity/pubkey">the engine public key</a></div>' +
      '</div>';
  });
})();
</script>
