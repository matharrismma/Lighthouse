<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contributor · Concordance Engine</title>
  <meta name="description" content="A contributor's record on the Concordance engine. Tier, badges earned, work attributed to them.">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    .profile-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 28px 30px;
      margin-bottom: 24px;
    }
    .profile-hero .tier-pill {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px; border-radius: 4px;
      background: rgba(217,164,65,0.13);
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      margin-bottom: 14px;
    }
    .profile-hero .tier-pill.curator {
      background: rgba(217,164,65,0.25);
      border-color: var(--accent);
      color: #1a1208;
      background-color: var(--accent);
    }
    .profile-hero h1 {
      margin: 0 0 4px 0;
      font-size: 30px;
      font-family: 'Crimson Pro', serif;
      font-weight: 600;
    }
    .profile-hero .handle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .profile-hero .bio {
      font-size: 15px; line-height: 1.6;
      color: var(--text);
      max-width: 580px;
      margin-bottom: 16px;
    }
    .profile-hero .meta {
      display: flex; flex-wrap: wrap; gap: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--muted-2);
    }
    .profile-hero .meta .k { color: var(--muted); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    @media (max-width: 760px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    .stat-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px;
    }
    .stat-tile .lbl {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 6px;
    }
    .stat-tile .val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 24px; font-weight: 600;
      color: var(--text);
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px 20px;
      margin-bottom: 22px;
    }
    .panel h3 {
      font-size: 13px; font-weight: 600;
      letter-spacing: 0.05em;
      margin: 0 0 14px 0;
      color: var(--text);
    }

    .badge-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    .badge-card {
      background: rgba(217,164,65,0.08);
      border: 1px solid var(--accent-dim);
      border-radius: 6px;
      padding: 12px 14px;
    }
    .badge-card .label {
      font-weight: 600; color: var(--accent);
      font-size: 13.5px;
      margin-bottom: 4px;
    }
    .badge-card .id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--muted);
      margin-bottom: 6px;
    }
    .badge-card .desc {
      font-size: 12px; color: var(--muted-2);
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .badge-card .when {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px; color: var(--muted);
      font-style: italic;
    }

    .next-rung {
      background: rgba(80,200,120,0.06);
      border: 1px dashed rgba(80,200,120,0.4);
      border-radius: 6px;
      padding: 14px 16px;
      margin-top: 12px;
      font-size: 13.5px;
      color: var(--muted-2);
    }
    .next-rung strong { color: #b8eccd; }

    .verify-block {
      background: rgba(0,0,0,0.18);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      color: var(--muted-2);
      word-break: break-all;
      margin-top: 14px;
    }
    .not-found {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }
    .not-found h2 {
      font-family: 'Crimson Pro', serif;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 12px 0;
    }
  </style>
  <!-- og-card injected -->
  <meta property="og:type" content="profile">
  <meta property="og:title" content="Contributor · Concordance Engine">
  <meta property="og:description" content="A contributor">
  <meta property="og:url" content="https://narrowhighway.com/contributor.html">
  <meta property="og:image" content="https://narrowhighway.com/chi-rho.svg">
  <meta property="og:site_name" content="Concordance Engine">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contributor · Concordance Engine">
  <meta name="twitter:description" content="A contributor">
  <meta name="twitter:image" content="https://narrowhighway.com/chi-rho.svg">
  <link rel="canonical" href="https://narrowhighway.com/contributor.html">
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"ProfilePage","name":"Contributor · Concordance Engine","description":"A contributor","url":"https://narrowhighway.com/contributor.html","isPartOf":{"@type":"WebSite","name":"Concordance Engine","url":"https://narrowhighway.com"},"publisher":{"@type":"Organization","name":"Concordance Engine","url":"https://narrowhighway.com","logo":{"@type":"ImageObject","url":"https://narrowhighway.com/chi-rho.svg"}}}</script>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="/" class="brand"><span class="brand-mark"></span> Concordance Engine</a>
    <nav class="topnav">
      <a href="/" class="nav-home" aria-label="Home" title="Home" style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:28px;background:rgba(217,168,114,0.10);border:1px solid rgba(217,168,114,0.32);border-radius:5px;color:var(--accent);margin-right:6px;transition:all .15s;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12 L12 3 L21 12"/><path d="M5 10 L5 21 L19 21 L19 10"/></svg></a>
      <a href="/how-it-works.html">How it works</a>
      <a href="/almanac.html">Almanac</a>
      <a href="/dashboard.html">Activity</a>
      <a href="/library.html">Library</a>
      <a href="/poly.html">Polymathic</a>
      <a href="/benchmark.html">Benchmark</a>
      <a href="/install.html">Install</a>
      <a href="https://github.com/matharrismma/Lighthouse">GitHub</a>
      <a class="cta" href="/connect.html">Connect →</a>
    </nav>
  </div>
</header>

<main class="container" style="padding-top: 32px; padding-bottom: 80px;">

  <div id="profileBody">
    <div class="not-found">Loading…</div>
  </div>

</main>

<script>
const $ = (id) => document.getElementById(id);
const params = new URLSearchParams(location.search);
const handle = (params.get('h') || params.get('handle') || '').toLowerCase().trim();

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtTime(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
  } catch (e) { return '—'; }
}
function fmtJoined(iso, seq) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    return d.toISOString().slice(0,10) + ' (#' + (seq||'?') + ')';
  } catch (e) { return '—'; }
}

async function load() {
  if (!handle || !handle.match(/^[a-z][a-z0-9_-]{2,31}$/)) {
    $('profileBody').innerHTML = `
      <div class="not-found">
        <h2>No handle specified</h2>
        <p>Append <code>?h=yourhandle</code> to the URL, or <a href="/dashboard.html">go to the dashboard</a> to register one.</p>
      </div>`;
    return;
  }
  let prof, badgeCatalog;
  try {
    const [pRes, bRes] = await Promise.all([
      fetch('/community/contributor/' + encodeURIComponent(handle)),
      fetch('/community/badges'),
    ]);
    if (!pRes.ok) {
      $('profileBody').innerHTML = `
        <div class="not-found">
          <h2>Contributor not found</h2>
          <p>No record for <code>${escapeHtml(handle)}</code>. <a href="/dashboard.html">Pick up that handle</a>?</p>
        </div>`;
      return;
    }
    prof = await pRes.json();
    badgeCatalog = (await bRes.json()).badges || [];
  } catch (e) {
    $('profileBody').innerHTML = `<div class="not-found"><h2>Network error</h2><p>${escapeHtml(String(e))}</p></div>`;
    return;
  }

  document.title = (prof.display_name || prof.handle) + ' · Concordance Contributor';

  const earnedIds = new Set((prof.badges || []).map(b => b.id));
  const earnedDecorated = (prof.badges || []).map(b => {
    const cat = badgeCatalog.find(c => c.id === b.id) || {};
    return Object.assign({}, b, {
      label: cat.label || b.id,
      summary: cat.summary || '',
    });
  });

  // Find the next badge they could earn (first unearned badge in the catalog).
  const nextBadge = badgeCatalog.find(b => !earnedIds.has(b.id));

  const stats = prof.stats || {};
  const tierClass = prof.tier === 'curator' ? 'curator' : '';

  $('profileBody').innerHTML = `
    <div class="profile-hero">
      <div class="tier-pill ${tierClass}">${escapeHtml(prof.tier_label || prof.tier || 'Visitor')}</div>
      <h1>${escapeHtml(prof.display_name || prof.handle)}</h1>
      <div class="handle">@${escapeHtml(prof.handle)}</div>
      ${prof.bio ? `<div class="bio">${escapeHtml(prof.bio)}</div>` : ''}
      <div class="meta">
        <span><span class="k">joined:</span> ${escapeHtml(fmtJoined(prof.joined_iso, prof.join_seq))}</span>
        <span><span class="k">badges:</span> ${prof.badge_count || 0}</span>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-tile">
        <div class="lbl">Polymathic runs</div>
        <div class="val">${stats.polymathic_runs || 0}</div>
      </div>
      <div class="stat-tile">
        <div class="lbl">Concordant</div>
        <div class="val">${stats.polymathic_concordant || 0}</div>
      </div>
      <div class="stat-tile">
        <div class="lbl">Almanac proposals</div>
        <div class="val">${stats.proposals_submitted || 0}</div>
      </div>
      <div class="stat-tile">
        <div class="lbl">Accepted</div>
        <div class="val">${stats.proposals_accepted || 0}</div>
      </div>
      <div class="stat-tile">
        <div class="lbl">Witnesses given</div>
        <div class="val">${stats.witnesses_given || 0}</div>
      </div>
      <div class="stat-tile">
        <div class="lbl">Witnesses received</div>
        <div class="val">${stats.witnesses_received || 0}</div>
      </div>
    </div>

    <section class="panel">
      <h3>Badges earned · ${earnedDecorated.length}</h3>
      ${earnedDecorated.length ? `
        <div class="badge-grid">
          ${earnedDecorated.map(b => `
            <div class="badge-card">
              <div class="label">${escapeHtml(b.label)}</div>
              <div class="id">${escapeHtml(b.id)}</div>
              <div class="desc">${escapeHtml(b.summary)}</div>
              ${b.earned_at ? `<div class="when">earned ${escapeHtml(fmtTime(new Date(b.earned_at*1000).toISOString()))}</div>` : ''}
            </div>
          `).join('')}
        </div>
      ` : '<div style="color: var(--muted-2); font-style: italic;">No badges yet — every contributor starts here.</div>'}

      ${nextBadge ? `
        <div class="next-rung">
          <strong>Next rung:</strong> <code>${escapeHtml(nextBadge.id)}</code> — ${escapeHtml(nextBadge.summary)}
          ${nextBadge.tier_unlock ? ` Unlocks the ${escapeHtml(nextBadge.tier_unlock)} tier.` : ''}
        </div>` : ''}
    </section>

    ${prof.user_pubkey ? `
    <section class="panel">
      <h3>Cryptographic anchor</h3>
      <div style="font-size: 13px; color: var(--muted-2); margin-bottom: 8px;">
        This contributor's Ed25519 public key. Sealed packets attributed to them
        carry a signature verifiable against this key.
      </div>
      <div class="verify-block">${escapeHtml(prof.user_pubkey)}</div>
    </section>` : ''}

    <p style="margin-top: 32px; font-size: 12px; color: var(--muted-2); text-align: center;">
      <a href="/dashboard.html">← back to activity</a> · share: <code>${escapeHtml(location.origin)}/contributor.html?h=${escapeHtml(prof.handle)}</code>
    </p>
  `;
}

load();
</script>
</body>
</html>
