<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your tutor — learn anything, a step at a time</title>
<meta name="description" content="A lifelong tutor and coach. Pick a subject — reading, writing, math, science, our world, the Bible — and learn it the way it's used: model, then together, then you. Free, patient, yours.">
<meta name="theme-color" content="#0d1117">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Crimson+Pro:ital@0;1&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d1117;--panel:#161b26;--tx:#eef2f7;--dim:#9aa6b8;--mut:#5f6b7e;--line:#26303f;
        --gold:#e3c498;--sound:#5fb0ff;--blend:#6fe0a8;--warm:#ffce6b;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:radial-gradient(ellipse 90% 60% at 50% 0%,#16203a 0%,#0d1117 60%);color:var(--tx);
       font-family:Inter,system-ui,sans-serif;min-height:100dvh;-webkit-font-smoothing:antialiased;}
  a{color:var(--gold);text-decoration:none;}
  .wrap{max-width:760px;margin:0 auto;padding:18px 18px 70px;}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .kicker{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mut);}
  .home{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);}

  .subjects{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;}
  .sub{font-family:Inter,sans-serif;font-size:13px;font-weight:500;color:var(--dim);background:#141a24;
       border:1px solid var(--line);border-radius:20px;padding:8px 15px;cursor:pointer;transition:.16s;}
  .sub:hover{color:#fff;border-color:var(--gold);}
  .sub.on{background:var(--gold);color:#1a1410;border-color:var(--gold);font-weight:600;}
  .teachbar{display:flex;gap:8px;margin-bottom:18px;}
  .teachbar input{flex:1;padding:12px 15px;background:#0f1620;color:var(--tx);border:1px solid var(--line);border-radius:11px;font-family:Inter,sans-serif;font-size:15px;}
  .teachbar input:focus{outline:none;border-color:var(--gold);}
  .teachbar button{padding:0 18px;background:transparent;color:var(--gold);border:1px solid var(--gold);border-radius:11px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;white-space:nowrap;}
  .teachbar button:hover{background:rgba(227,196,152,.12);} .teachbar button:disabled{opacity:.4;cursor:default;}
  @media(max-width:540px){.teachbar{flex-direction:column;}.teachbar button{padding:11px;}}
  .genbanner{font-family:'Crimson Pro',Georgia,serif;font-size:.95rem;color:var(--gold);background:rgba(227,196,152,.07);border:1px solid rgba(227,196,152,.25);border-radius:10px;padding:10px 14px;margin-bottom:14px;line-height:1.5;}
  .genbanner span{color:var(--dim);font-style:italic;}

  .unit-title{font-family:'Crimson Pro',Georgia,serif;font-weight:400;font-size:clamp(1.5rem,4vw,2.1rem);color:#fff;line-height:1.12;margin:2px 0 5px;}
  .rule{font-family:'Crimson Pro',Georgia,serif;color:var(--dim);font-size:clamp(1rem,1.9vw,1.12rem);line-height:1.55;max-width:62ch;}

  .modes{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:18px 0 4px;}
  .mode{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
        color:var(--mut);border:1px solid var(--line);border-radius:14px;padding:5px 11px;}
  .mode .ar{color:var(--line);margin:0 2px;}
  .modes .step1{color:var(--gold);border-color:rgba(227,196,152,.4);}

  .stage{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px 18px 24px;
         margin:16px 0;text-align:center;box-shadow:0 18px 50px -28px #000;}
  /* reading: blend */
  .tiles{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;min-height:92px;align-items:center;}
  .tile{font-family:'Crimson Pro',Georgia,serif;font-weight:600;font-size:clamp(2.4rem,10vw,4rem);line-height:1;
        color:#fff;background:#1c2433;border:2px solid var(--line);border-radius:14px;padding:6px 16px;min-width:58px;
        cursor:pointer;transition:transform .25s,border-color .25s,color .25s,box-shadow .25s,background .25s;position:relative;user-select:none;}
  .tile .snd{position:absolute;left:0;right:0;bottom:-22px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--mut);opacity:0;transition:opacity .25s;}
  .tile.lit{color:var(--sound);border-color:var(--sound);box-shadow:0 0 26px -4px var(--sound);transform:translateY(-6px);}
  .tile.lit .snd{opacity:1;color:var(--sound);}
  .tile.vowel.lit{color:var(--warm);border-color:var(--warm);box-shadow:0 0 26px -4px var(--warm);}
  .tile.vowel.lit .snd{color:var(--warm);}
  .tiles.blended{gap:0;}
  .tiles.blended .tile{color:var(--blend);border-color:transparent;background:transparent;box-shadow:none;transform:none;padding:6px 1px;}
  .tiles.blended .tile .snd{opacity:0;}
  .wordrow{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px;}
  .wchip{font-family:'Crimson Pro',Georgia,serif;font-size:1.1rem;color:var(--dim);background:transparent;border:1px solid var(--line);border-radius:20px;padding:5px 14px;cursor:pointer;transition:.16s;}
  .wchip:hover{color:#fff;border-color:var(--gold);} .wchip.on{color:#1a1410;background:var(--gold);border-color:var(--gold);font-weight:600;}
  /* other subjects: practice cards */
  .cards{display:flex;flex-direction:column;gap:9px;text-align:left;}
  .pcard{background:#1c2433;border:1px solid var(--line);border-left:3px solid var(--blend);border-radius:0 11px 11px 0;
         padding:13px 16px;font-family:'Crimson Pro',Georgia,serif;font-size:1.12rem;color:#f1f5fa;line-height:1.45;
         cursor:pointer;transition:.16s;display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .pcard:hover{border-color:var(--gold);}
  .pcard .spk{font-size:14px;color:var(--mut);flex:none;}
  /* math: ten-frame manipulative */
  .tfgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-width:340px;margin:0 auto;}
  .tfcell{aspect-ratio:1;background:#1c2433;border:2px solid var(--line);border-radius:10px;cursor:pointer;transition:.15s;}
  .tfcell:hover{border-color:var(--gold);}
  .tfcell.on{background:var(--blend);border-color:var(--blend);box-shadow:0 0 16px -4px var(--blend);}
  .tfcount{font-family:'Crimson Pro',Georgia,serif;font-size:3.2rem;color:#fff;margin:14px 0 0;line-height:1;}
  .tfframes{display:flex;flex-direction:column;gap:12px;}
  .tfBhide{display:none;}
  @media (prefers-reduced-motion: reduce){ *{transition:none!important;animation:none!important;scroll-behavior:auto!important;} }

  .ctrls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:30px;}
  .btn{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.05em;border:1px solid var(--line);
       background:#1c2433;color:var(--tx);border-radius:11px;padding:12px 19px;cursor:pointer;transition:.16s;}
  .btn:hover{border-color:var(--gold);color:#fff;} .btn:disabled{opacity:.4;cursor:default;}
  .btn.primary{background:var(--gold);color:#1a1410;border-color:var(--gold);font-weight:700;}
  .btn.primary:hover{background:#f0d6ac;}
  .hint{font-family:'Crimson Pro',Georgia,serif;font-style:italic;color:var(--dim);font-size:.98rem;margin-top:15px;min-height:1.4em;}

  .sent{margin-top:20px;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--blend);border-radius:0 12px 12px 0;padding:15px 18px;}
  .sent .l{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);margin-bottom:7px;}
  .sent .t{font-family:'Crimson Pro',Georgia,serif;font-size:1.28rem;color:#fff;line-height:1.5;cursor:pointer;}
  .sent .t:hover{color:var(--blend);}
  .check{margin-top:18px;color:var(--dim);font-family:'Crimson Pro',Georgia,serif;font-size:1.02rem;line-height:1.55;}
  .check b{color:var(--warm);font-weight:600;}
  .help{margin-top:14px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--mut);}
  .help span{color:var(--dim);border:1px solid var(--line);border-radius:10px;padding:3px 8px;margin-right:5px;display:inline-block;margin-top:5px;}

  .nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:28px;}
  .nav .seq{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mut);letter-spacing:.1em;}
  .track{display:flex;flex-wrap:wrap;gap:5px;margin-top:22px;justify-content:center;}
  .tdot{width:9px;height:9px;border-radius:50%;background:var(--line);cursor:pointer;transition:.16s;}
  .tdot:hover{background:var(--dim);} .tdot.cur{background:var(--gold);box-shadow:0 0 8px var(--gold);}
  .loading{text-align:center;color:var(--dim);font-family:'Crimson Pro',Georgia,serif;font-style:italic;padding:60px 0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="kicker">Your tutor &middot; learn anything, a step at a time</div><a class="home" href="/">&larr; home</a></div>
  <div class="subjects" id="subjects"></div>
  <div class="teachbar">
    <input id="topic" type="text" autocomplete="off" placeholder="Or teach me anything — photosynthesis · fractions · the dragonfly">
    <button id="teach">Teach me &rarr;</button>
  </div>
  <div id="lesson"><div class="loading">Opening your lessons&hellip;</div></div>
  <div class="track" id="track"></div>
</div>
<script>
(function(){
  var DIG={sh:'sh',ch:'ch',th:'th',ck:'k',ng:'ng',wh:'w',ph:'f',qu:'kw'};
  var VOW='aeiou';
  var NUM={1:'one',2:'two',3:'three',4:'four',5:'five',6:'six',7:'seven',8:'eight',9:'nine',10:'ten',11:'eleven',12:'twelve',13:'thirteen',14:'fourteen',15:'fifteen',16:'sixteen',17:'seventeen',18:'eighteen',19:'nineteen',20:'twenty'};
  var SND={a:'a',e:'e',i:'i',o:'o',u:'u',b:'b',c:'k',d:'d',f:'f',g:'g',h:'h',j:'j',k:'k',l:'l',m:'m',n:'n',p:'p',q:'kw',r:'r',s:'s',t:'t',v:'v',w:'w',x:'ks',y:'y',z:'z',sh:'sh',ch:'ch',th:'th',ck:'k',ng:'ng',wh:'w',ph:'f',qu:'kw'};
  function segment(w){ w=(w||'').toLowerCase().replace(/[^a-z]/g,''); var g=[],i=0; while(i<w.length){var two=w.substr(i,2); if(DIG[two]){g.push(two);i+=2;}else{g.push(w[i]);i++;}} return g; }
  function isWord(s){ return /^[a-zA-Z]{2,8}$/.test((s||'').trim()); }
  function say(t,rate){ try{ if(!window.speechSynthesis)return; var u=new SpeechSynthesisUtterance(t); u.rate=rate||0.9; u.pitch=1.05; speechSynthesis.cancel(); speechSynthesis.speak(u);}catch(e){} }
  // make a clickable <div> operable by keyboard + screen reader (serve the least includes the disabled)
  function clickable(el, fn, label){
    if(!el) return;
    el.addEventListener('click', fn);
    el.tabIndex = 0;
    el.setAttribute('role','button');
    if(label) el.setAttribute('aria-label', label);
    el.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '||e.key==='Spacebar'){ e.preventDefault(); fn(e); } });
  }
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

  // subjects in a sensible learning order; "reading" = the blend interaction applies
  var META=[
    {key:'phonics',name:'Sounds',reading:true},
    {key:'reading',name:'Reading',reading:true},
    {key:'writing',name:'Writing',reading:false},
    {key:'math',name:'Math',reading:false},
    {key:'science',name:'Science',reading:false},
    {key:'social_studies',name:'Our World',reading:false},
    {key:'bible_curriculum',name:'Bible',reading:false}
  ];
  var SUBJECTS=[], si=0, ui=0;

  function loadCurriculum(){
    return fetch('/curriculum').then(function(r){ if(!r.ok) throw 0; return r.json(); })
      .catch(function(){ return fetch('https://narrowhighway.com/curriculum').then(function(r){return r.json();}); });
  }
  loadCurriculum().then(function(d){
    var C=d.tracks||d;   // /curriculum returns {tracks:{phonics:[...]}}; tolerate a flat shape too
    META.forEach(function(m){
      var u=(C[m.key]||[]).slice().sort(function(a,b){return (a.unit_seq||0)-(b.unit_seq||0);});
      if(u.length) SUBJECTS.push({key:m.key,name:m.name,reading:m.reading,units:u});
    });
    if(!SUBJECTS.length){ document.getElementById('lesson').innerHTML='<div class="loading">Lessons are loading elsewhere — try again shortly.</div>'; return; }
    renderSubjects(); render();
  }).catch(function(){ document.getElementById('lesson').innerHTML='<div class="loading">Could not reach your lessons just now.</div>'; });

  function renderSubjects(){
    document.getElementById('subjects').innerHTML=SUBJECTS.map(function(s,i){
      return '<button class="sub'+(i===si?' on':'')+'" data-i="'+i+'">'+esc(s.name)+'</button>';
    }).join('');
    document.querySelectorAll('.sub').forEach(function(b){ b.addEventListener('click',function(){ si=+b.getAttribute('data-i'); ui=0; renderSubjects(); render(); }); });
  }
  function renderTrack(){
    var s=SUBJECTS[si];
    document.getElementById('track').innerHTML=s.units.map(function(u,i){ return '<span class="tdot'+(i===ui?' cur':'')+'" data-i="'+i+'"></span>'; }).join('');
    document.querySelectorAll('.tdot').forEach(function(d){ d.addEventListener('click',function(){ ui=+d.getAttribute('data-i'); render(); }); });
  }

  function modeStrip(u){
    var ms=(u.modes||[]).map(function(m,i){ return '<span class="mode'+(i===0?' step1':'')+'">'+esc(m.label||m.id||'')+'</span>'; });
    if(!ms.length) return '';
    return '<div class="modes">'+ms.join('<span class="ar">&rarr;</span>')+'</div>';
  }
  function helpStrip(u){
    var w=(u.wedges||[]).map(function(x){return x.replace('wedge_','');}).filter(function(x){return x!=='praise';});
    if(!w.length) return '';
    return '<div class="help">stuck? &nbsp;'+w.map(function(x){return '<span>'+esc(x)+'</span>';}).join('')+'</div>';
  }

  function render(){
    var s=SUBJECTS[si], u=s.units[ui];
    var rule=(u.rule||'').split('. ').slice(0,2).join('. '); if(rule && rule.slice(-1)!=='.') rule+='.';
    var words=s.reading?(u.examples||[]).filter(isWord).slice(0,8):[];
    var useBlend=words.length>=2;
    var useTen=(s.key==='math' && !useBlend);
    var tfCells=Array.apply(null,{length:10}).map(function(_,i){return '<div class="tfcell" data-i="'+i+'"></div>';}).join('');
    var tfHTML='<div class="tfframes"><div class="tfgrid" id="tfgridA">'+tfCells+'</div><div id="tfB" class="tfBhide"><div class="tfgrid" id="tfgridB">'+tfCells+'</div></div></div>'+
      '<div class="tfcount"><span id="tfn">0</span></div>'+
      '<div class="hint" id="hint">Tap the boxes to count. Fill the frame to make ten.</div>'+
      '<div class="ctrls" id="tftargets">'+[5,10,14,20].map(function(k){return '<button class="btn" data-k="'+k+'">show '+k+'</button>';}).join('')+'<button class="btn" data-k="0">clear</button></div>';
    var L=document.getElementById('lesson');
    var practice = useBlend
      ? ('<div class="wordrow" id="wordrow">'+words.map(function(w,i){return '<button class="wchip'+(i===0?' on':'')+'" data-w="'+esc(w)+'">'+esc(w)+'</button>';}).join('')+'</div>'+
         '<div class="tiles" id="tiles"></div>'+
         '<div class="ctrls"><button class="btn primary" id="sound">▶ Sound it out</button><button class="btn" id="blend" disabled>Blend it &rarr;</button><button class="btn" id="hear">🔊 Hear it</button></div>'+
         '<div class="hint" id="hint">Press <b>Sound it out</b> and watch each part light up.</div>')
      : useTen ? tfHTML
      : ('<div class="cards" id="cards">'+(u.examples||[]).slice(0,6).map(function(e){return '<div class="pcard" data-say="'+esc(e)+'"><span>'+esc(e)+'</span><span class="spk">🔊</span></div>';}).join('')+'</div>'+
         '<div class="hint">Tap a line to hear it. Then read it back — that is the practice.</div>');

    L.innerHTML=
      '<div class="unit-title">'+esc(u.title||'')+'</div>'+
      '<div class="rule">'+esc(rule)+'</div>'+
      modeStrip(u)+
      '<div class="stage">'+practice+'</div>'+
      (u.decodable_sentence?('<div class="sent"><div class="l">now read this</div><div class="t" id="sent">'+esc(u.decodable_sentence)+'</div></div>'):'')+
      (u.check&&u.check.prompt?('<div class="check"><b>Check &middot;</b> '+esc(u.check.prompt)+'</div>'):'')+
      helpStrip(u)+
      '<div class="nav"><button class="btn" id="prev"'+(ui===0?' disabled':'')+'>&larr; back</button><span class="seq">'+esc(s.name)+' &middot; '+(ui+1)+' / '+s.units.length+'</span><button class="btn" id="next"'+(ui===s.units.length-1?' disabled':'')+'>next &rarr;</button></div>';

    if(useBlend){
      setWord(words[0]);
      document.querySelectorAll('#wordrow .wchip').forEach(function(c){ c.addEventListener('click',function(){ document.querySelectorAll('#wordrow .wchip').forEach(function(x){x.classList.remove('on');}); c.classList.add('on'); setWord(c.getAttribute('data-w')); }); });
      document.getElementById('sound').addEventListener('click',soundOut);
      document.getElementById('blend').addEventListener('click',blend);
      document.getElementById('hear').addEventListener('click',function(){ say(curWord); });
    } else if(useTen){
      tfWire();
    } else {
      document.querySelectorAll('#cards .pcard').forEach(function(c){ clickable(c, function(){ say(c.getAttribute('data-say'),0.92); }, 'Hear: '+(c.getAttribute('data-say')||'')); });
    }
    var sent=document.getElementById('sent'); if(sent) clickable(sent, function(){ say(sent.textContent,0.85); }, 'Hear the sentence');
    document.getElementById('prev').addEventListener('click',function(){ if(ui>0){ui--;render();} });
    document.getElementById('next').addEventListener('click',function(){ if(ui<s.units.length-1){ui++;render();} });
    renderTrack();
  }

  // ── the reading chunk: segment -> sound out -> blend ──
  var curWord='', curG=[];
  function setWord(w){
    curWord=w; curG=segment(w);
    var t=document.getElementById('tiles'); if(!t) return; t.className='tiles';
    t.innerHTML=curG.map(function(g){var v=VOW.indexOf(g[0])>=0&&g.length===1; return '<span class="tile'+(v?' vowel':'')+'">'+g+'<span class="snd">/'+(SND[g]||g)+'/</span></span>';}).join('');
    document.querySelectorAll('#tiles .tile').forEach(function(el){ el.addEventListener('click',function(){ el.classList.add('lit'); setTimeout(function(){el.classList.remove('lit');},700); }); });
    document.getElementById('blend').disabled=true;
    var h=document.getElementById('hint'); if(h) h.innerHTML='Press <b>Sound it out</b> and watch each part light up.';
  }
  function soundOut(){
    var tiles=document.querySelectorAll('#tiles .tile'); if(!tiles.length) return;
    document.getElementById('tiles').className='tiles';
    tiles.forEach(function(el){el.classList.remove('lit');});
    document.getElementById('hint').innerHTML='Each part has a sound. Hear them in order&hellip;';
    var i=0;
    (function step(){ if(i>0) tiles[i-1].classList.remove('lit');
      if(i>=tiles.length){ document.getElementById('blend').disabled=false; document.getElementById('hint').innerHTML='Now <b>blend</b> the sounds into one word.'; return; }
      tiles[i].classList.add('lit'); i++; setTimeout(step,720); })();
  }
  function blend(){
    document.querySelectorAll('#tiles .tile').forEach(function(el){el.classList.remove('lit');});
    document.getElementById('tiles').classList.add('blended');
    document.getElementById('hint').innerHTML='&hellip;<b>'+esc(curWord)+'</b>. You read it! 🎉 Try the next word, or read the sentence.';
    say(curWord,0.8);
  }

  // ── the math chunk: a ten-frame you fill to count and make ten ──
  function tfFill(n){
    n=Math.max(0,Math.min(20,n));
    var a=Math.min(n,10), b=Math.max(0,n-10);
    document.querySelectorAll('#tfgridA .tfcell').forEach(function(c,i){ c.classList.toggle('on', i<a); });
    document.querySelectorAll('#tfgridB .tfcell').forEach(function(c,i){ c.classList.toggle('on', i<b); });
    var B=document.getElementById('tfB'); if(B) B.classList.toggle('tfBhide', n<=10);
    var nn=document.getElementById('tfn'); if(nn) nn.textContent=n;
    var h=document.getElementById('hint');
    if(h){ if(n===0) h.innerHTML='Tap the boxes to count. Fill the frame to make ten.';
      else if(n<10) h.innerHTML='<b>'+n+'</b> &middot; '+(10-n)+' more makes ten.';
      else if(n===10) h.innerHTML='<b>10</b> — a full frame! Keep going for the teens.';
      else if(n<20) h.innerHTML='<b>'+n+'</b> = ten and <b>'+(n-10)+'</b> more.';
      else h.innerHTML='<b>20</b> — two full frames! 🎉'; }
    if(n>0) say(NUM[n]||(''+n));
  }
  function tfWire(){
    document.querySelectorAll('#tfgridA .tfcell').forEach(function(c){ var n=+c.getAttribute('data-i')+1; clickable(c, function(){ tfFill(n); }, 'Fill to '+n); });
    document.querySelectorAll('#tfgridB .tfcell').forEach(function(c){ var n=10 + +c.getAttribute('data-i') + 1; clickable(c, function(){ tfFill(n); }, 'Fill to '+n); });
    document.querySelectorAll('#tftargets .btn').forEach(function(b){ b.addEventListener('click',function(){ tfFill(+b.getAttribute('data-k')); }); });
  }

  // ── learn anything: the tutor drafts a lesson on any topic (curate, not filter) ──
  function renderGenerated(u){
    var L=document.getElementById('lesson');
    L.innerHTML=
      '<div class="genbanner">&#10022; Fresh lesson on &ldquo;'+esc(u.topic||'')+'&rdquo; &middot; <span>'+esc(u.source_note||'drafted for you')+'</span></div>'+
      '<div class="unit-title">'+esc(u.title||'')+'</div>'+
      '<div class="rule">'+esc(u.rule||'')+'</div>'+
      modeStrip(u)+
      '<div class="stage"><div class="cards">'+(u.examples||[]).slice(0,6).map(function(e){return '<div class="pcard" data-say="'+esc(e)+'"><span>'+esc(e)+'</span><span class="spk">🔊</span></div>';}).join('')+'</div><div class="hint">Tap a line to hear it. Read it back — that is the practice.</div></div>'+
      (u.check&&u.check.prompt?('<div class="check"><b>Check &middot;</b> '+esc(u.check.prompt)+'</div>'):'')+
      helpStrip(u)+
      '<div class="nav"><button class="btn" id="back">&larr; back to subjects</button><span class="seq">drafted lesson</span><button class="btn" id="again">teach something else</button></div>';
    document.querySelectorAll('#lesson .pcard').forEach(function(c){ clickable(c, function(){ say(c.getAttribute('data-say'),0.92); }, 'Hear: '+(c.getAttribute('data-say')||'')); });
    document.getElementById('back').addEventListener('click',function(){ render(); });
    document.getElementById('again').addEventListener('click',function(){ document.getElementById('topic').focus(); });
    document.getElementById('track').innerHTML='';
  }
  async function nhTeach(){
    var t=(document.getElementById('topic').value||'').trim(); if(!t) return;
    var b=document.getElementById('teach'); b.disabled=true;
    document.getElementById('lesson').innerHTML='<div class="loading">Drafting your lesson on &ldquo;'+esc(t)+'&rdquo;&hellip;</div>';
    document.getElementById('track').innerHTML='';
    try{
      var r=await fetch('/tutor/lesson',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:t})});
      if(!r.ok){ document.getElementById('lesson').innerHTML='<div class="loading">The tutor could not draft that just now — try a subject above.</div>'; b.disabled=false; return; }
      renderGenerated(await r.json());
    }catch(e){ document.getElementById('lesson').innerHTML='<div class="loading">Could not reach the tutor — try again.</div>'; }
    b.disabled=false;
  }
  document.getElementById('teach').addEventListener('click',nhTeach);
  document.getElementById('topic').addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); nhTeach(); } });
  // deep-link: /read.html?topic=... drafts that lesson on arrival (the work area hands off here)
  try{ var qt=new URLSearchParams(location.search).get('topic'); if(qt){ var ti=document.getElementById('topic'); if(ti){ ti.value=qt; nhTeach(); } } }catch(e){}
})();
</script>
