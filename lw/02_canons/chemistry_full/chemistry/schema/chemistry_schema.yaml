schema: chemistry_module
version: "1.0"

required_top_level_keys:
  - module
  - version
  - status
  - scope
  - frozen_nouns_extensions
  - red_constraints
  - floor_checks
  - way_methods
  - execution
  - diagnostics

types:
  module: "string"
  version: "string"
  status: "string"
  scope:
    purpose: "string"
    includes: "list[string]"
    excludes: "list[string]"
  frozen_nouns_extensions: "list[map]"
  red_constraints: "list[string]"
  floor_checks: "list[string]"
  way_methods: "list[string]"
  execution: "map"
  diagnostics: "map"

conventions:
  - "Use snake_case keys."
  - "Execution steps should be deterministic and unit-checked."
  - "Diagnostics must include at least one failure mode per major assumption."
